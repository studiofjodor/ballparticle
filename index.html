<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Landscape</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050f;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }

    .label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    #startBtn {
      pointer-events: all;
      padding: 14px 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: border-color 0.3s, background 0.3s;
    }
    #startBtn:hover {
      border-color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.04);
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
    }

    #bands {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-align: right;
      line-height: 2.2;
      pointer-events: none;
    }
    #bands span { display: inline-block; min-width: 90px; text-align: left; }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="label">Sound Landscape</div>
    <button id="startBtn">● Enable Microphone</button>
    <div class="label">Web Audio API · WebGL</div>
  </div>

  <div id="info">
    Sound Landscape &nbsp;·&nbsp; Drag to orbit &nbsp;·&nbsp; Scroll to zoom
  </div>

  <div id="bands">
    <div>Sub &nbsp;<span id="b-sub">————————————</span></div>
    <div>Bass <span id="b-bass">————————————</span></div>
    <div>Mid &nbsp;<span id="b-mid">————————————</span></div>
    <div>High <span id="b-high">————————————</span></div>
  </div>

  <!-- Three.js via ES Module CDN — kein Build-Step nötig -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─────────────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────────────
    const CFG = {
      fftSize:    1024,   // frequencyBinCount = fftSize / 2 = 512
      freqBins:   64,     // Spalten (X-Achse = Frequenz)
      timeSlices: 80,     // Reihen  (Z-Achse = Zeit/Tiefe)
      planeWidth: 14,     // World-Units Breite
      planeDepth: 10,     // World-Units Tiefe
      maxHeight:  2.8,    // Max. Vertex-Auslenkung (Y)
      smoothing:  0.80,   // AnalyserNode smoothingTimeConstant (0–1)
    };

    const COLS = CFG.freqBins;
    const ROWS = CFG.timeSlices;

    // ─────────────────────────────────────────────
    // SCENE / CAMERA / RENDERER
    // ─────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05050f);
    scene.fog = new THREE.FogExp2(0x05050f, 0.052);

    const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 6.5, 9.5);
    camera.lookAt(0, 0, -1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance   = 3;
    controls.maxDistance   = 24;
    controls.maxPolarAngle = Math.PI * 0.47;
    controls.target.set(0, 0, -1);

    // ─────────────────────────────────────────────
    // GEOMETRY
    // PlaneGeometry → COLS × ROWS Vertices
    // rotateX(-90°) → liegt flach in der XZ-Ebene
    //
    // Vertex-Layout nach Rotation:
    //   Row 0    → Z = -depth/2 (hinten / weit weg)
    //   Row ROWS-1 → Z = +depth/2 (vorne / kamera-nah)
    //
    // Mapping: Neueste Daten (history[0]) erscheinen VORNE.
    // ─────────────────────────────────────────────
    const geometry = new THREE.PlaneGeometry(
      CFG.planeWidth,
      CFG.planeDepth,
      COLS - 1,
      ROWS - 1
    );
    geometry.rotateX(-Math.PI / 2);

    geometry.setAttribute('color',
      new THREE.BufferAttribute(new Float32Array(COLS * ROWS * 3), 3)
    );

    // Wireframe-Schicht (Hauptvisuell)
    const wireMesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
      vertexColors: true,
      wireframe:    true,
      transparent:  true,
      opacity:      0.75,
      toneMapped:   false,
    }));

    // Solid-Fill-Schicht (Tiefenwirkung / Glow-Simulation)
    const solidMesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
      vertexColors: true,
      transparent:  true,
      opacity:      0.07,
      side:         THREE.DoubleSide,
      toneMapped:   false,
    }));

    scene.add(solidMesh);
    scene.add(wireMesh);

    // Referenzgrid auf dem Boden
    const grid = new THREE.GridHelper(22, 22, 0x0d0d20, 0x0d0d20);
    grid.position.y = -0.02;
    scene.add(grid);

    // ─────────────────────────────────────────────
    // HISTORY BUFFER
    // history[0] = neueste Daten
    // history[ROWS-1] = älteste Daten
    // ─────────────────────────────────────────────
    const history = Array.from({ length: ROWS }, () => new Float32Array(COLS));

    // ─────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────
    const tmpColor = new THREE.Color();

    // Farb-Mapping: Tiefe Frequenzen → warm (orange/rot), hohe → kühl (blau/cyan)
    function freqToColor(nFreq, amplitude) {
      const hue  = 0.05 + nFreq * 0.53; // 0.05 = orange  →  0.58 = cyan-blau
      const sat  = 0.75 + amplitude * 0.25;
      const lum  = 0.10 + amplitude * 0.65;
      return tmpColor.setHSL(hue, sat, lum);
    }

    // Frequenzbänder in Hz (nicht Bin-Index!)
    function getFrequencyBands(data, sampleRate = 44100) {
      const binHz = sampleRate / CFG.fftSize;
      const avg = (lo, hi) => {
        const s = Math.max(0, Math.floor(lo / binHz));
        const e = Math.min(data.length - 1, Math.ceil(hi / binHz));
        if (e <= s) return 0;
        let sum = 0;
        for (let i = s; i <= e; i++) sum += data[i];
        return (sum / (e - s + 1)) / 255;
      };
      return {
        sub:  avg(20,   80),
        bass: avg(80,   250),
        mid:  avg(250,  2000),
        high: avg(2000, 8000),
      };
    }

    function makeMeter(v, w = 12) {
      const n = Math.round(v * w);
      return '█'.repeat(n) + '░'.repeat(w - n);
    }

    // ─────────────────────────────────────────────
    // AUDIO — getUserMedia → AudioContext → AnalyserNode
    // ─────────────────────────────────────────────
    let analyser  = null;
    let dataArray = null;
    let running   = false;

    document.getElementById('startBtn').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: false,
        });

        const ctx     = new AudioContext();
        const source  = ctx.createMediaStreamSource(stream);
        analyser      = ctx.createAnalyser();

        analyser.fftSize               = CFG.fftSize;         // → frequencyBinCount = 512
        analyser.smoothingTimeConstant = CFG.smoothing;

        source.connect(analyser);
        // KEIN connect zu ctx.destination → kein Feedback-Loop!

        dataArray = new Uint8Array(analyser.frequencyBinCount);
        running   = true;

        document.getElementById('overlay').classList.add('hidden');
      } catch (err) {
        alert('Microphone access denied:\n' + err.message);
      }
    });

    // ─────────────────────────────────────────────
    // UPDATE — Landscape aus Audio-Daten aufbauen
    // ─────────────────────────────────────────────
    const posArr = geometry.attributes.position.array;
    const colArr = geometry.attributes.color.array;

    function updateLandscape() {
      analyser.getByteFrequencyData(dataArray);

      // History scrollen: alle Reihen um 1 nach hinten
      for (let r = ROWS - 1; r > 0; r--) history[r].set(history[r - 1]);

      // Neue Reihe vorne (history[0]) mit aktuellem FFT befüllen
      // step = 512 / 64 = 8 → jeder 8. Bin wird genommen
      const step = Math.floor(analyser.frequencyBinCount / COLS);
      for (let c = 0; c < COLS; c++) {
        history[0][c] = dataArray[c * step] / 255;
      }

      // Vertices aktualisieren
      // Vertex-Row 0 = hinten (weit) → bekommt älteste Daten (history[ROWS-1])
      // Vertex-Row ROWS-1 = vorne (nah) → bekommt neueste Daten (history[0])
      for (let r = 0; r < ROWS; r++) {
        const hIdx   = (ROWS - 1) - r;              // history-Index für diese Vertex-Reihe
        const age    = 1 - (hIdx / (ROWS - 1)) * 0.65; // neu = 1.0, alt = 0.35

        for (let c = 0; c < COLS; c++) {
          const vi    = r * COLS + c;
          const amp   = history[hIdx][c];
          const nFreq = c / (COLS - 1);

          // Y-Auslenkung (Höhe der Landschaft)
          posArr[vi * 3 + 1] = amp * CFG.maxHeight * age;

          // Vertexfarbe
          const col = freqToColor(nFreq, amp * age);
          colArr[vi * 3]     = col.r;
          colArr[vi * 3 + 1] = col.g;
          colArr[vi * 3 + 2] = col.b;
        }
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate    = true;

      // Band-Meter aktualisieren
      const b = getFrequencyBands(dataArray);
      document.getElementById('b-sub').textContent  = makeMeter(b.sub);
      document.getElementById('b-bass').textContent = makeMeter(b.bass);
      document.getElementById('b-mid').textContent  = makeMeter(b.mid);
      document.getElementById('b-high').textContent = makeMeter(b.high);
    }

    // ─────────────────────────────────────────────
    // IDLE ANIMATION — ambient Wellen vor Mic-Start
    // ─────────────────────────────────────────────
    function updateIdle(t) {
      for (let r = 0; r < ROWS; r++) {
        const nz  = r / (ROWS - 1);
        const age = 1 - nz * 0.5;

        for (let c = 0; c < COLS; c++) {
          const vi   = r * COLS + c;
          const nx   = c / (COLS - 1);
          const wave = (Math.sin(nx * 5.0 + t * 0.6) * Math.cos(nz * 3.5 - t * 0.4) + 1) * 0.5;
          const amp  = wave * 0.16 * age;

          posArr[vi * 3 + 1] = amp;

          tmpColor.setHSL(0.58 + nx * 0.08, 0.5, 0.06 + amp * 2.8);
          colArr[vi * 3]     = tmpColor.r;
          colArr[vi * 3 + 1] = tmpColor.g;
          colArr[vi * 3 + 2] = tmpColor.b;
        }
      }
      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate    = true;
    }

    // ─────────────────────────────────────────────
    // RENDER LOOP
    // ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    (function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      running ? updateLandscape() : updateIdle(t);

      controls.update();
      renderer.render(scene, camera);
    })();
  </script>

</body>
</html>
